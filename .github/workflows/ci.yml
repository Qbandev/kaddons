name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOLANGCI_LINT_VERSION: v2.10.1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.11'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
          golangci-lint run
      - name: Test
        run: go test ./... -race -v
      - name: Ensure module tidy (advisory)
        continue-on-error: true
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "::warning::go.mod/go.sum differ after tidy in CI environment."
            git diff -- go.mod go.sum
          fi

  validate-addon-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.11'
          cache: true
      - name: Validate stored compatibility data
        run: go run ./cmd/kaddons-validate --stored-only
      - name: Validate compatibility matrix coverage (advisory)
        continue-on-error: true
        run: go run ./cmd/kaddons-validate --matrix

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.11'
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Govulncheck
        run: govulncheck ./...
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.23.0
      - name: Gosec
        run: gosec ./...

  install-via-homebrew-tap:
    if: github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - name: Tap repository
        run: brew tap qbandev/tap
      - name: Check formula availability
        id: homebrew_formula
        run: |
          if brew info qbandev/tap/kaddons >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Formula qbandev/tap/kaddons not found yet; skipping install verification."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Tap and install formula
        if: steps.homebrew_formula.outputs.exists == 'true'
        run: |
          brew install qbandev/tap/kaddons
      - name: Verify Homebrew-installed binary
        if: steps.homebrew_formula.outputs.exists == 'true'
        run: kaddons --version
